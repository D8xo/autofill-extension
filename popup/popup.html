<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Filler</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">Application Filler</h1>
    <p class="subtitle" id="subtitle">Ready to fill this page.</p>

    <button id="fill-btn" class="btn">Fill Application</button>

    <!-- Results shown after filling -->
    <div id="results" class="results hidden">
      <div id="results-summary" class="results-summary"></div>
      <div id="unfilled-list"></div>
    </div>

    <a id="edit-profile-link" href="#" class="settings-link">Edit Profile</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
