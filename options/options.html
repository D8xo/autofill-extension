<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Application Filler</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>My Profile</h1>
      <p class="header-sub">Fill this out once. The extension uses it to autofill job applications.</p>
    </header>

    <form id="profile-form">

      <!-- PERSONAL -->
      <section>
        <h2>Personal</h2>
        <div class="row-2">
          <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="Jane" />
          </div>
          <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Smith" />
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="jane@example.com" />
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="555-867-5309" />
          </div>
        </div>
        <div class="field">
          <label for="addressStreet">Street Address</label>
          <input type="text" id="addressStreet" name="addressStreet" placeholder="123 Main St" />
        </div>
        <div class="row-2">
          <div class="field">
            <label for="addressCity">City</label>
            <input type="text" id="addressCity" name="addressCity" placeholder="Austin" />
          </div>
          <div class="field">
            <label for="addressState">State</label>
            <input type="text" id="addressState" name="addressState" placeholder="TX" />
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="addressZip">ZIP Code</label>
            <input type="text" id="addressZip" name="addressZip" placeholder="78701" />
          </div>
          <div class="field">
            <label for="addressCountry">Country</label>
            <input type="text" id="addressCountry" name="addressCountry" placeholder="United States" />
          </div>
        </div>
        <div class="field">
          <label for="linkedin">LinkedIn URL</label>
          <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/janesmith" />
        </div>
        <div class="row-2">
          <div class="field">
            <label for="github">GitHub URL</label>
            <input type="url" id="github" name="github" placeholder="https://github.com/janesmith" />
          </div>
          <div class="field">
            <label for="portfolio">Portfolio URL</label>
            <input type="url" id="portfolio" name="portfolio" placeholder="https://janesmith.dev" />
          </div>
        </div>
      </section>

      <!-- WORK AUTHORIZATION -->
      <section>
        <h2>Work Authorization</h2>
        <div class="row-2">
          <div class="field">
            <label>Authorized to work in the US?</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="workAuthorized" value="yes" /> Yes</label>
              <label class="radio-label"><input type="radio" name="workAuthorized" value="no" /> No</label>
            </div>
          </div>
          <div class="field">
            <label>Require visa sponsorship?</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="requireSponsorship" value="yes" /> Yes</label>
              <label class="radio-label"><input type="radio" name="requireSponsorship" value="no" /> No</label>
            </div>
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="veteranStatus">Veteran Status</label>
            <select id="veteranStatus" name="veteranStatus">
              <option value="">-- Select --</option>
              <option value="not_veteran">I am not a protected veteran</option>
              <option value="veteran">I identify as a protected veteran</option>
              <option value="decline">I prefer not to say</option>
            </select>
          </div>
          <div class="field">
            <label for="disabilityStatus">Disability Status</label>
            <select id="disabilityStatus" name="disabilityStatus">
              <option value="">-- Select --</option>
              <option value="no">No, I don't have a disability</option>
              <option value="yes">Yes, I have a disability</option>
              <option value="decline">I prefer not to say</option>
            </select>
          </div>
        </div>
      </section>

      <!-- EDUCATION -->
      <section>
        <h2>Education</h2>
        <div class="row-2">
          <div class="field">
            <label for="schoolName">School Name</label>
            <input type="text" id="schoolName" name="schoolName" placeholder="University of Texas" />
          </div>
          <div class="field">
            <label for="degree">Degree</label>
            <select id="degree" name="degree">
              <option value="">-- Select --</option>
              <option value="High School Diploma">High School Diploma</option>
              <option value="Associate's">Associate's</option>
              <option value="Bachelor's">Bachelor's</option>
              <option value="Master's">Master's</option>
              <option value="MBA">MBA</option>
              <option value="PhD">PhD</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="major">Major / Field of Study</label>
            <input type="text" id="major" name="major" placeholder="Computer Science" />
          </div>
          <div class="field">
            <label for="gpa">GPA</label>
            <input type="text" id="gpa" name="gpa" placeholder="3.8" />
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="gradMonth">Graduation Month</label>
            <select id="gradMonth" name="gradMonth">
              <option value="">-- Month --</option>
              <option value="01">January</option>
              <option value="02">February</option>
              <option value="03">March</option>
              <option value="04">April</option>
              <option value="05">May</option>
              <option value="06">June</option>
              <option value="07">July</option>
              <option value="08">August</option>
              <option value="09">September</option>
              <option value="10">October</option>
              <option value="11">November</option>
              <option value="12">December</option>
            </select>
          </div>
          <div class="field">
            <label for="gradYear">Graduation Year</label>
            <input type="text" id="gradYear" name="gradYear" placeholder="2024" />
          </div>
        </div>
      </section>

      <!-- EXPERIENCE -->
      <section>
        <h2>Experience</h2>
        <div class="row-2">
          <div class="field">
            <label for="yearsExperience">Years of Experience</label>
            <input type="number" id="yearsExperience" name="yearsExperience" placeholder="3" min="0" />
          </div>
          <div class="field">
            <label for="recentTitle">Most Recent Job Title</label>
            <input type="text" id="recentTitle" name="recentTitle" placeholder="Software Engineer" />
          </div>
        </div>
        <div class="field">
          <label for="recentCompany">Most Recent Company</label>
          <input type="text" id="recentCompany" name="recentCompany" placeholder="Acme Corp" />
        </div>
      </section>

      <!-- PREFERENCES -->
      <section>
        <h2>Preferences</h2>
        <div class="row-2">
          <div class="field">
            <label for="desiredSalary">Desired Salary</label>
            <input type="text" id="desiredSalary" name="desiredSalary" placeholder="120000" />
          </div>
          <div class="field">
            <label for="startDate">Available Start Date</label>
            <input type="date" id="startDate" name="startDate" />
          </div>
        </div>
        <div class="field">
          <label>Job Type Preference</label>
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="jobType" value="Remote" /> Remote</label>
            <label class="radio-label"><input type="radio" name="jobType" value="Hybrid" /> Hybrid</label>
            <label class="radio-label"><input type="radio" name="jobType" value="Onsite" /> Onsite</label>
          </div>
        </div>
      </section>

      <!-- CUSTOM Q&A -->
      <section>
        <h2>Custom Answers</h2>
        <p class="section-sub">Pre-write answers to questions that come up often.</p>

        <div class="field">
          <label for="customQ1">Question 1</label>
          <input type="text" id="customQ1" name="customQ1" placeholder='e.g. "How did you hear about us?"' />
          <label for="customA1" class="label-secondary">Answer</label>
          <textarea id="customA1" name="customA1" rows="2" placeholder="LinkedIn"></textarea>
        </div>

        <div class="field">
          <label for="customQ2">Question 2</label>
          <input type="text" id="customQ2" name="customQ2" placeholder='e.g. "Why do you want to work here?"' />
          <label for="customA2" class="label-secondary">Answer</label>
          <textarea id="customA2" name="customA2" rows="2" placeholder="Your answer..."></textarea>
        </div>

        <div class="field">
          <label for="customQ3">Question 3</label>
          <input type="text" id="customQ3" name="customQ3" placeholder='e.g. "Describe yourself in one sentence."' />
          <label for="customA3" class="label-secondary">Answer</label>
          <textarea id="customA3" name="customA3" rows="2" placeholder="Your answer..."></textarea>
        </div>
      </section>

      <div class="form-footer">
        <span id="save-status" class="save-status"></span>
        <button type="submit" class="btn-save">Save Profile</button>
      </div>

    </form>
  </div>
  <script src="options.js"></script>
</body>
</html>
